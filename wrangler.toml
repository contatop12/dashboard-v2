# Workers static assets + bundle das Pages Functions (migrate_pages_to_workers_guide — MCP Cloudflare).
# O deploy padrão do Workers Builds (`npx wrangler deploy`) passa a funcionar após `npm run build`.

name = "dashboard-v2"
account_id = "922956353923d5563a21f8a5203202e9"
compatibility_date = "2024-10-01"

main = "dist/_worker.js/index.js"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "p12-dashboard"
database_id = "372e21d2-f512-47b7-a650-80daa718f82b"
