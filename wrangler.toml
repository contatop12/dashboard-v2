# Workers Builds usa a conta abaixo — deve bater com account_id aqui.
#
# Variáveis de runtime:
# - Não secretas → [vars] abaixo (podem ir para o Git se não forem sensíveis).
# - Secretas → Dashboard (Workers → dashboard-v2 → Settings → Variables and Secrets)
#   ou CLI: npm run cf:secrets (usa .dev.vars no formato KEY=VALUE — não commitado).
#   Também: npx wrangler secret put NOME
#
name = "dashboard-v2"
account_id = "0976ee0adac0062c726747d29549308e"
compatibility_date = "2024-10-01"

main = "dist/_worker.js/index.js"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Exemplo — só descomente se o Worker ler env.MEU_FLAG (valor público):
# [vars]
# MEU_FLAG = "valor"

[[d1_databases]]
binding = "DB"
database_name = "p12-dashboard"
database_id = "3b5eb527-6424-46cd-adb9-2beb36831a37"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true
